services:
  registry:
    image: registry:2
    container_name: paymybuddy-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry

  paymybuddy-db:
    build:
      context: .
      target: database
    image: localhost:5000/paymybuddy-db:1.0
    container_name: paymybuddy-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  paymybuddy-backend:
    build:
      context: .
      target: backend
    image: localhost:5000/paymybuddy-backend:1.0
    container_name: paymybuddy-backend
    restart: unless-stopped
    depends_on:
      paymybuddy-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://paymybuddy-db:3306/db_paymybuddy
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  mysql_data:
  registry_data:
